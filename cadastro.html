<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="css/cadastro.css">
  <script src="js/cadastro.js" defer></script>

</head>
<body>
  <!-- 4. [página 4] A página de cadastro de novo tutor e/ou pet deve apresentar campos para cadastro de uma
pessoa, incluindo CPF, Email, Endereço, Cidade, senha e login de acesso. Também devem ser incluídos
campos coerentes com o contexto, como telefone, nome do pet, espécie, raça, idade do pet e observações
de saúde. Utilize o método GET para que possamos avaliar os campos que estão sendo enviados; -->

<div>
  <h3>cadastro</h3>
  <p>Cadastre-se para agendar serviços para seu pet</p>
</div>

<section>
  <div>
    <h5>Dados do Tutor</h5>
    <p>Informações pessoais do responsável pelo pet</p>
  </div>

  <div>
    <label for="nome_dono" >Nome completo *</label>
    <input type="text" id="nome_dono" name="nome_dono" placeholder="João Silva Pereira">

    <label for="cpf" >CPF *</label>
    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">

    <label for="email" >Email *</label>
    <input type="email" id="email" name="email" placeholder="nome@gmail.com">

    <label for="telefone" >Telefone * </label>
    <input type="number" id="telefone" name="telefone" placeholder="(00) 00000-0000">
  </div>

  <button>Cancelar</button>
  <button>Finalizar Cadastro</button>

  <p>Já tem uma conta?</p>
  <a href="login.html">Login</a>
</section>
</body>
</html>
